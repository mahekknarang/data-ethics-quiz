<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Host · Data Ethics Quiz</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/host.css" />
  </head>
  <body class="host">
    <div class="gate" id="gate">
      <form class="gate-card" id="gate-form">
        <h1>Host access</h1>
        <p style="margin: 0; color: #888; font-size: 0.9rem">Enter the shared passcode</p>
        <input type="password" id="passcode" placeholder="Passcode" autocomplete="current-password" />
        <button type="submit">Enter control deck</button>
        <div class="gate-error" id="gate-error"></div>
      </form>
    </div>

    <div class="host-shell" id="shell">
      <header class="host-top">
        <div>
          <p class="brand">Data Ethics · Live Host</p>
          <h1 id="host-title">Lobby</h1>
        </div>
        <div class="stat-row">
          <div class="stat">
            <div class="label">Players</div>
            <div class="value mono" id="stat-players">0</div>
          </div>
          <div class="stat">
            <div class="label">Answered</div>
            <div class="value mono" id="stat-answered">0/0</div>
          </div>
          <div class="stat">
            <div class="label">Question</div>
            <div class="value mono" id="stat-q">—</div>
          </div>
        </div>
      </header>

      <div class="host-main">
        <section class="panel" id="panel-lobby">
          <h2>Join link</h2>
          <div class="qr-wrap">
            <img id="qr" alt="QR code to join quiz" />
            <div class="join-url mono" id="join-url"></div>
            <div class="live-count mono" id="live-count">0 <span>joined</span></div>
          </div>
        </section>

        <section class="panel">
          <h2>Live stage</h2>
          <div class="q-display" id="stage">
            <div class="phase mono" id="phase-label">LOBBY</div>
            <p class="question" id="stage-q">Waiting for players…</p>
            <div class="options-preview" id="options-preview"></div>
            <div class="tally mono" id="tally">
              <span class="num" id="tally-num">0</span> / <span id="tally-total">0</span> answered
            </div>
          </div>
          <ol class="host-lb" id="host-lb"></ol>
        </section>
      </div>

      <footer class="host-footer">
        <div class="controls">
          <button type="button" class="primary" id="btn-start">Start Quiz</button>
          <button type="button" id="btn-next" disabled>Next Question</button>
          <button type="button" id="btn-end" disabled>End Quiz</button>
          <button type="button" class="danger" id="btn-reset">Reset Session</button>
        </div>
        <a class="dash-link hidden" id="dash-link" href="/dashboard" target="_blank" rel="noopener"
          >Open Data Dashboard →</a
        >
      </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/host.js"></script>
  </body>
</html>
